<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Survey</title>

<style>
  :root {
    --bg: #000;
    --panel: rgba(18, 18, 18, 0.92);
    --text: #f5f5f5;
    --line: rgba(255, 255, 255, 0.12);
    --blue: #1a73e8;
    --yellow: #fbbc04;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(180deg, #050505 0%, #000 100%);
    color: var(--text);
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
  }

  .container {
    width: 100%;
    max-width: 560px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 36px 26px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  }

  .question {
    font-size: 32px;
    margin-bottom: 28px;
    min-height: 80px;
  }

  .notice {
    font-size: 22px;
    margin-bottom: 28px;
  }

  #a {
    display: grid;
    gap: 10px;
  }

  button, input {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.14);
    color: var(--text);
    padding: 13px;
    border-radius: 14px;
    font-size: 15px;
  }

  .warning {
    position: fixed;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.65);
    z-index: 999;
  }

  .warning.show {
    display: flex;
  }

  .warning-box {
    width: min(92%, 520px);
    background: #fff;
    color: #111;
    border-radius: 18px;
    padding: 22px;
    display: flex;
    gap: 14px;
  }

  .warning-icon {
    background: #111;
    color: var(--yellow);
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
  }

  .warning-actions button.selected {
    background: var(--blue);
    color: #fff;
  }
</style>
</head>

<body>

<div class="container" id="screen">
  <div class="question" id="q"></div>
  <div id="a"></div>
</div>

<div class="warning" id="warn">
  <div class="warning-box">
    <div class="warning-icon">⚠</div>
    <div>
      <h2>Security warning</h2>
      <p id="warnText"></p>
      <div class="warning-actions">
        <button id="continueBtn" onclick="chooseWarn('continue')">Continue reading</button>
        <button id="leaveBtn" onclick="chooseWarn('leave')">Abandon site</button>
      </div>
    </div>
  </div>
</div>

<script>
const questions = [
  { type:"input", q:"How old are you?" },
  { type:"input", q:"What is your favorite color?" },
  { q:"Do you prefer day or night?", c:["Day","Night","Both"] },
  { q:"Do you like being alone or with others?", c:["Alone","With others","Depends"] },
  { q:"Do you have a song you’ve been listening to a lot lately?", c:["Yes","Sometimes","No"] },
  { q:"Do you usually fall asleep quickly or does it take time?", c:["Quickly","It takes time","Depends"] },
  { q:"Have you ever woken up in the middle of the night for no reason?", c:["Yes","Sometimes","No"] },
  { q:"Do you prefer silence or having background noise?", c:["Silence","Noise","Either"] },
  { q:"Have you ever felt like someone was watching you?", c:["Yes","Maybe","No"] },
  { q:"Do you feel uncomfortable sleeping with your door open?", c:["Yes","Sometimes","No"] },
  { q:"What would you do if you heard a noise in your house?", c:["Check","Ignore","Call someone"] },
  { q:"Would your phone turning on scare you?", c:["Yes","A bit","No"] },
  { q:"Have you seen something strange?", c:["Yes","Maybe","No"] },
  { q:"Would you stay calm if called?", c:["Yes","No","Not sure"] },
  { q:"Do you sometimes look behind you?", c:["Yes","Sometimes","No"] },
  { q:"Does it make you uncomfortable to think someone might be reading this with you?", c:["Yes","A little","No"] },
  { q:"Did you check your surroundings before continuing?", c:["Yes","No","Maybe"] },
  { q:"Are you completely sure you are alone?", c:["Yes","Maybe","No"] },
  { type:"notice", q:"Before finishing..." },
  { q:"Where are you answering this from?", c:["Home","School","Other"] }
];

let i = 0;

function typeText(text) {
  const el = document.getElementById("q");
  el.innerHTML = "";
  let n = 0;
  const t = setInterval(() => {
    el.innerHTML += text[n];
    n++;
    if (n >= text.length) clearInterval(t);
  }, 20);
}

function show() {
  if (i >= questions.length) {
    document.getElementById("screen").innerHTML = `
      <h2>Analysis complete.</h2>
      <button onclick="goAway()">View results</button>
    `;
    return;
  }

  let q = questions[i];
  typeText(q.q);

  let a = document.getElementById("a");
  a.innerHTML = "";

  if (q.type === "input") {
    let input = document.createElement("input");
    input.onkeydown = e => { if (e.key === "Enter") next(); };
    a.appendChild(input);
  } else if (q.type === "notice") {
    let b = document.createElement("button");
    b.innerText = "Continue";
    b.onclick = next;
    a.appendChild(b);
  } else {
    q.c.forEach(opt => {
      let b = document.createElement("button");
      b.innerText = opt;
      b.onclick = next;
      a.appendChild(b);
    });
  }
}

function next() {
  i++;
  show();
}

function goAway() {
  window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ&list=RDdQw4w9WgXcQ&start_radio=1";
}

show();
</script>

</body>
</html>
