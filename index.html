<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Survey</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

.container {
  width: 90%;
  max-width: 500px;
}

.question {
  font-size: 26px;
  margin-bottom: 30px;
  min-height: 60px;
}

button, input {
  background: #111;
  border: 1px solid #333;
  color: white;
  padding: 12px;
  margin: 8px;
  width: 100%;
  font-size: 15px;
  cursor: pointer;
}

button:hover {
  background: #222;
}

.warning {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  color: white;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  border: 2px solid #333;
}

</style>
</head>

<body>

<div class="container">
  <div class="question" id="q"></div>
  <div id="a"></div>
</div>

<div class="warning" id="warn">
  <h2>⚠ This page may be unsafe</h2>
  <p>Proceed carefully.</p>
  <button onclick="closeWarn()">Continue</button>
</div>

<script>
const questions = [
{type:"input", q:"How old are you?"},
{type:"input", q:"What is your favorite color?"},
{q:"Do you prefer day or night?", c:["Day","Night","Both"]},
{q:"Do you prefer being alone or with others?", c:["Alone","With others","Depends"]},
{q:"Is there a song you listen to a lot?", c:["Yes","Sometimes","No"]},
{q:"Do you fall asleep quickly?", c:["Yes","Sometimes","No"]},
{q:"Do you like silence or background noise?", c:["Silence","Noise","Either"]},
{q:"Have you ever felt watched?", c:["Yes","Maybe","No"]},
{q:"Do you feel uncomfortable sleeping with the door open?", c:["Yes","Sometimes","No"]},
{q:"What would you do if you heard a noise at night?", c:["Check","Ignore","Call someone"]},
{q:"Would you get nervous if your phone turned on alone?", c:["Yes","A bit","No"]},
{q:"Have you seen something you can't explain?", c:["Yes","Maybe","No"]},
{q:"Would you stay calm if someone said your name?", c:["Yes","No","Not sure"]},
{q:"Do you look behind you sometimes?", c:["Yes","Sometimes","No"]},
{q:"What if an answer changed?", c:["Close","Check","Ignore"]},
{q:"Does it bother you someone could read this?", c:["Yes","A little","No"]},
{q:"Did you check around you?", c:["Yes","No","Maybe"]},
{q:"Are you sure you're alone?", c:["Yes","Maybe","No"]},
{q:"Where are you right now?", c:["Home","School","Other"]}
];

let i = 0;

function type(text) {
  let el = document.getElementById("q");
  el.innerHTML = "";
  let n = 0;

  let t = setInterval(() => {
    el.innerHTML += text[n];
    n++;
    if (n >= text.length) clearInterval(t);
  }, 20);
}

function show() {
  if (i >= questions.length) {
    document.body.innerHTML = `
      <h2>Analyzing...</h2>
      <br><br>
      <button onclick="go()">View Results</button>
    `;
    return;
  }

  let q = questions[i];
  type(q.q);

  let a = document.getElementById("a");
  a.innerHTML = "";

  if (q.type === "input") {
    let input = document.createElement("input");
    input.placeholder = "Press Enter...";
    input.onkeydown = e => {
      if (e.key === "Enter") next();
    };
    a.appendChild(input);
    input.focus();
  } else {
    q.c.forEach(opt => {
      let b = document.createElement("button");
      b.innerText = opt;
      b.onclick = next;
      a.appendChild(b);
    });
  }

  if (i === 8 || i === 14) {
    setTimeout(() => {
      document.getElementById("warn").style.display = "flex";
    }, 400);
  }
}

function next() {
  i++;
  show();
}

function closeWarn() {
  document.getElementById("warn").style.display = "none";
}

function go() {
  window.location.href = "https://www.youtube.com/watch?v=oHg5SJYRHA0";
}

show();
</script>

</body>
</html>
