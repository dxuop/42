<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Survey</title>

<style>
body {
  background: #111;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  margin: 0;
}

.container {
  max-width: 600px;
}

button, input {
  margin: 10px;
  padding: 10px;
  font-size: 16px;
  cursor: pointer;
}

.warning {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  color: black;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}
</style>

</head>
<body>

<div class="container">
  <h2 id="question"></h2>
  <div id="answers"></div>
</div>

<div class="warning" id="warning">
  <h2>⚠️ This page may be unsafe</h2>
  <p>This is a simulated warning.</p>
  <button onclick="closeWarning()">Continue</button>
</div>

<script>
const questions = [
{q:"How old are you?", type:"input"},
{q:"What is your favorite color?", type:"input"},
{q:"Do you prefer day or night?", c:["Day","Night","Both"]},
{q:"Do you prefer being alone or with others?", c:["Alone","With others","Depends"]},
{q:"Is there a song you’ve been listening to a lot lately?", c:["Yes","Sometimes","No"]},
{q:"Do you fall asleep quickly?", c:["Yes","Sometimes","No"]},
{q:"Do you like silence or background noise?", c:["Silence","Noise","Either"]},
{q:"Have you ever felt like someone was watching you?", c:["Yes","Maybe","No"]},
{q:"Do you feel uncomfortable sleeping with your door open?", c:["Yes","Sometimes","No"]},
{q:"What would you do if you heard a noise at night?", c:["Check","Ignore","Call someone"]},
{q:"Would you get nervous if your phone turned on by itself?", c:["Yes","A bit","No"]},
{q:"Have you ever seen something you couldn't explain?", c:["Yes","Maybe","No"]},
{q:"Would you stay calm if someone said your name right now?", c:["Yes","Probably not","No"]},
{q:"Do you sometimes look behind you for no reason?", c:["Yes","Sometimes","No"]},
{q:"What would you do if one answer changed?", c:["Close it","Check again","Keep going"]},
{q:"Does it bother you that someone could be reading this with you?", c:["Yes","A little","No"]},
{q:"Did you check your surroundings before continuing?", c:["Yes","Not really","No"]},
{q:"Are you completely sure you are alone?", c:["Yes","Maybe","No"]},
{q:"Before finishing… where are you answering from?", c:["Home","School","Somewhere else"]}
];

let index = 0;
let typing;

function type(text) {
  clearInterval(typing);
  let i = 0;
  const el = document.getElementById("question");
  el.innerHTML = "";

  typing = setInterval(() => {
    el.innerHTML += text[i];
    i++;
    if (i >= text.length) clearInterval(typing);
  }, 25);
}

function show() {
  if (index >= questions.length) {
    document.body.innerHTML = `
      <h2>Analyzing...</h2>
      <br><br>
      <button onclick="go()">View Results</button>
    `;
    return;
  }

  let q = questions[index];
  type(q.q);

  let ans = document.getElementById("answers");
  ans.innerHTML = "";

  if (q.type === "input") {
    let input = document.createElement("input");
    input.placeholder = "Press Enter...";
    input.onkeydown = e => {
      if (e.key === "Enter") next();
    };
    ans.appendChild(input);
    input.focus();
  } else {
    q.c.forEach(opt => {
      let b = document.createElement("button");
      b.innerText = opt;
      b.onclick = next;
      ans.appendChild(b);
    });
  }

  // 👁️ advertencia en preguntas raras
  if (index === 8 || index === 14) {
    setTimeout(() => {
      document.getElementById("warning").style.display = "flex";
    }, 500);
  }
}

function next() {
  index++;
  show();
}

function closeWarning() {
  document.getElementById("warning").style.display = "none";
}

function go() {
  window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
}

show();
</script>

</body>
</html>
