<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Survey</title>

<style>
body {
  background: #111;
  color: white;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
}

.container {
  max-width: 600px;
}

button, input {
  margin-top: 15px;
  padding: 10px;
  font-size: 16px;
}
</style>

</head>
<body>

<div class="container">
  <h2 id="question"></h2>
  <div id="answers"></div>
</div>

<script>
const questions = [
{q:"How old are you?", type:"input"},
{q:"What is your favorite color?", type:"input"},
{q:"Do you prefer day or night?", choices:["Day","Night","Both"]},
{q:"Do you prefer being alone or with others?", choices:["Alone","With others","Depends"]},
{q:"Is there a song you’ve been listening to a lot lately?", choices:["Yes","Sometimes","No"]},
{q:"Do you fall asleep quickly?", choices:["Yes","Sometimes","No"]},
{q:"Do you like silence or background noise?", choices:["Silence","Noise","Either"]},
{q:"Have you ever felt like someone was watching you?", choices:["Yes","Maybe","No"]},
{q:"Do you feel uncomfortable sleeping with your door open?", choices:["Yes","Sometimes","No"]},
{q:"What would you do if you heard a noise at night?", choices:["Check","Ignore","Call someone"]},
{q:"Would you get nervous if your phone turned on by itself?", choices:["Yes","A bit","No"]},
{q:"Have you ever seen something you couldn't explain?", choices:["Yes","Maybe","No"]},
{q:"Would you stay calm if someone said your name right now?", choices:["Yes","Probably not","No"]},
{q:"Do you sometimes look behind you for no reason?", choices:["Yes","Sometimes","No"]},
{q:"What would you do if one answer changed?", choices:["Close it","Check again","Keep going"]},
{q:"Does it bother you that someone could be reading this with you?", choices:["Yes","A little","No"]},
{q:"Did you check your surroundings before continuing?", choices:["Yes","Not really","No"]},
{q:"Are you completely sure you are alone?", choices:["Yes","Maybe","No"]},
{q:"Before finishing… where are you answering from?", choices:["Home","School","Somewhere else"]}
];

let index = 0;
let typingInterval;

function typeText(text) {
  clearInterval(typingInterval);
  let i = 0;
  const q = document.getElementById("question");
  q.innerHTML = "";

  typingInterval = setInterval(() => {
    q.innerHTML += text.charAt(i);
    i++;
    if (i >= text.length) clearInterval(typingInterval);
  }, 25);
}

function showQuestion() {
  if (index >= questions.length) {
    document.body.innerHTML = `
      <h2>Processing your answers...</h2>
      <br><br>
      <button onclick="go()">View Results</button>
    `;
    return;
  }

  const q = questions[index];
  typeText(q.q);

  const ans = document.getElementById("answers");
  ans.innerHTML = "";

  if (q.type === "input") {
    const input = document.createElement("input");
    input.placeholder = "Type and press Enter";
    input.addEventListener("keydown", e => {
      if (e.key === "Enter") next();
    });
    ans.appendChild(input);
    input.focus();
  } else {
    q.choices.forEach(c => {
      const btn = document.createElement("button");
      btn.innerText = c;
      btn.onclick = next;
      ans.appendChild(btn);
    });
  }
}

function next() {
  index++;
  showQuestion();
}

function go() {
  window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
}

showQuestion();
</script>

</body>
</html>
