<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Survey</title>

<style>
  :root {
    --bg: #000;
    --panel: rgba(18, 18, 18, 0.92);
    --text: #f5f5f5;
    --line: rgba(255, 255, 255, 0.12);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(180deg, #050505 0%, #000 100%);
    color: var(--text);
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
  }

  .container {
    width: 100%;
    max-width: 560px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 36px 26px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  }

  .question {
    font-size: 32px;
    line-height: 1.4;
    margin-bottom: 28px;
    min-height: 80px;
  }

  #a {
    display: grid;
    gap: 10px;
  }

  button, input {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.14);
    color: var(--text);
    padding: 13px;
    border-radius: 14px;
    font-size: 15px;
  }

  button:hover, input:focus {
    background: rgba(255,255,255,0.08);
  }

  .progress {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 999px;
    margin-bottom: 18px;
  }

  .progress-bar {
    height: 100%;
    width: 0%;
    background: #fff;
    transition: width 0.3s;
  }

  /* NUEVAS ADVERTENCIAS */
  .warning {
    position: fixed;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.55);
    z-index: 999;
  }

  .warning.show {
    display: flex;
  }

  .warning-box {
    width: 90%;
    max-width: 420px;
    background: #f5f5f5;
    color: #111;
    border-radius: 18px;
    border: 1px solid #ddd;
    padding: 20px;
    display: flex;
    gap: 12px;
    text-align: left;
  }

  .warning-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #111;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .warning-text h2 {
    margin: 0 0 5px;
    font-size: 16px;
  }

  .warning-text p {
    margin: 0 0 12px;
    font-size: 14px;
    color: #444;
  }

  .warning-text button {
    width: auto;
    padding: 8px 14px;
    background: #111;
    color: white;
    border: none;
    border-radius: 8px;
  }

</style>
</head>

<body>

<div class="container" id="screen">
  <div class="progress"><div class="progress-bar" id="bar"></div></div>
  <div class="question" id="q"></div>
  <div id="a"></div>
</div>

<!-- ADVERTENCIA NUEVA -->
<div class="warning" id="warn">
  <div class="warning-box">
    <div class="warning-icon">⚠</div>
    <div class="warning-text">
      <h2>Se detectó una advertencia</h2>
      <p id="warnText">Contenido sensible.</p>
      <button onclick="closeWarn()">Aceptar</button>
    </div>
  </div>
</div>

<script>
const questions = [
  { type: "input", q: "How old are you?" },
  { type: "input", q: "What is your favorite color?" },
  { q: "Do you prefer day or night?", c: ["Day","Night","Both"] },
  { q: "Do you prefer being alone or with others?", c: ["Alone","With others","Depends"] },
  { q: "Is there a song you listen to a lot?", c: ["Yes","Sometimes","No"] },
  { q: "Do you fall asleep quickly?", c: ["Yes","Sometimes","No"] },
  { q: "Do you like silence or noise?", c: ["Silence","Noise","Either"] },
  { q: "Have you ever felt watched?", c: ["Yes","Maybe","No"] },
  { q: "Do you feel uncomfortable at night?", c: ["Yes","Sometimes","No"] },
  { q: "What would you do if you heard a noise?", c: ["Check","Ignore","Call someone"] },
  { q: "Would your phone turning on scare you?", c: ["Yes","A bit","No"] },
  { q: "Have you seen something strange?", c: ["Yes","Maybe","No"] },
  { q: "Would you stay calm if called?", c: ["Yes","No","Not sure"] },
  { q: "Do you look behind you?", c: ["Yes","Sometimes","No"] },
  { q: "Does it bother you someone could read this?", c: ["Yes","A little","No"] },
  { q: "Did you check around you?", c: ["Yes","No","Maybe"] },
  { q: "Are you sure you're alone?", c: ["Yes","Maybe","No"] },
  { q: "Where are you right now?", c: ["Home","School","Other"] }
];

let i = 0;

function typeText(text) {
  let el = document.getElementById("q");
  el.innerHTML = "";
  let n = 0;
  let t = setInterval(() => {
    el.innerHTML += text[n];
    n++;
    if (n >= text.length) clearInterval(t);
  }, 20);
}

function updateProgress() {
  document.getElementById("bar").style.width = (i / questions.length) * 100 + "%";
}

function showWarning(text) {
  document.getElementById("warnText").textContent = text;
  document.getElementById("warn").classList.add("show");
}

function closeWarn() {
  document.getElementById("warn").classList.remove("show");
}

function show() {
  updateProgress();

  if (i >= questions.length) {
    document.getElementById("screen").innerHTML = `
      <h2>Done.</h2>
      <button onclick="go()">View Results</button>
    `;
    return;
  }

  let q = questions[i];
  typeText(q.q);

  let a = document.getElementById("a");
  a.innerHTML = "";

  if (q.type === "input") {
    let input = document.createElement("input");
    input.placeholder = "Press Enter...";
    input.onkeydown = e => { if (e.key === "Enter") next(); };
    a.appendChild(input);
    input.focus();
  } else {
    q.c.forEach(opt => {
      let b = document.createElement("button");
      b.innerText = opt;
      b.onclick = next;
      a.appendChild(b);
    });
  }

  // ADVERTENCIAS MÁS REALES AL FINAL
  if (i === 13) showWarning("Este contenido puede volverse incómodo.");
  if (i === 15) showWarning("Se recomienda responder con atención.");
  if (i === 16) showWarning("Últimas preguntas.");

}

function next() {
  i++;
  show();
}

function go() {
  window.location.href = "https://www.youtube.com/watch?v=oHg5SJYRHA0";
}

show();
</script>

</body>
</html>
